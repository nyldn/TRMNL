name: Plugin bug
description: Report a broken recipe or plugin behavior.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: recipe
    attributes:
      label: Recipe path
      placeholder: recipes/example
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands, screenshots, or TRMNL preview notes.

